# docker/grafana/provisioning/datasources/datasources.yaml
# Ce fichier est lu par Grafana au démarrage.
# Il connecte automatiquement Loki comme source de données —
# pas besoin de configurer manuellement dans l'interface.

apiVersion: 1

datasources:
  # Loki — logs (inchangé)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false          # Mimir devient la datasource par défaut
    version: 1
    editable: true
    jsonData:
      maxLines: 1000

  # Mimir — métriques long terme
  # Mimir expose une API compatible Prometheus,
  # donc on utilise le type "prometheus" dans Grafana.
  - name: Mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    version: 1
    editable: true
    jsonData:
      httpMethod: POST
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: anonymous

# Tempo — traces
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    version: 1
    editable: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: mimir  # lien service graph → métriques
      nodeGraph:
        enabled: true
      tracesToLogs:
        datasourceUid: loki
        tags: ["service.name"]
        mappedTags:
          - key: service.name
            value: service_name
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: mimir
        tags:
          - key: service.name
            value: service_name
      lokiSearch:
        datasourceUid: loki