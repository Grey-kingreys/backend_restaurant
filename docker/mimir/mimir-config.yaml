# docker/mimir/mimir-config.yaml
# Configuration minimale de Mimir pour le développement.
# Mimir reçoit les métriques de Prometheus via remote_write
# et les stocke localement.

# Mode mono-instance (pas de cluster en dev)
target: all
multitenancy_enabled: false

# Serveur HTTP
server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

# Stockage des blocs de métriques
blocks_storage:
  backend: filesystem
  filesystem:
    dir: /mimir/data/blocks
  bucket_store:
    sync_dir: /mimir/tsdb-sync
  tsdb:
    dir: /mimir/tsdb

# Compacteur — fusionne les blocs anciens pour économiser de l'espace
compactor:
  data_dir: /mimir/data/compactor
  sharding_ring:
    kvstore:
      store: memberlist

# Distributeur — reçoit les métriques entrantes (remote_write Prometheus)
distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

# Ingester — écrit les métriques en mémoire puis sur disque
ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

# Store-gateway — sert les métriques stockées sur disque
store_gateway:
  sharding_ring:
    replication_factor: 1

# Ruler — règles d'alerte (désactivées en dev)
ruler_storage:
  backend: filesystem
  filesystem:
    dir: /mimir/rules

# Limites adaptées au développement (moins strictes)
limits:
  ingestion_rate: 10000
  ingestion_burst_size: 200000
  max_label_names_per_series: 30